<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; padding: 40px; }
    .logo { color: #5B21B6; font-size: 24px; font-weight: bold; margin-bottom: 24px; }
    .badge { display: inline-block; background: #FEE2E2; color: #991B1B; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-bottom: 16px; }
    .footer { margin-top: 32px; color: #999; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Kora Events</div>
    <div class="badge">Inscrição cancelada</div>
    <h2 style="color:#111827; margin-top:0">Sua inscrição foi cancelada</h2>
    <p>Olá, <strong>{{name}}</strong>, sua inscrição no evento <strong>{{eventTitle}}</strong> foi cancelada.</p>
    <p style="color:#6B7280">Se isso foi um engano, entre em contato com o organizador do evento.</p>
    <div class="footer">
      &copy; 2025 Kora Events. Todos os direitos reservados.
    </div>
  </div>
</body>
</html>
